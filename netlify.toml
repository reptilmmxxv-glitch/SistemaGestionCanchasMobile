[build]
  base = "mobile-ionic"
  command = "npm install && npm run build"
  publish = "dist"

# SPA: cualquier ruta sin extensión -> index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Nunca fallback para assets reales (evita MIME tipo text/html en .js/.css)
[[redirects]]
  from = "/*.js"
  to = "/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*.css"
  to = "/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true



